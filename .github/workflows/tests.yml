name: Testy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/package.json'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/package.json'
  workflow_dispatch:   # możliwość ręcznego uruchomienia z UI GitHuba

defaults:
  run:
    working-directory: frontend

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Uruchom testy
        run: npm test

      - name: Podsumowanie wyników
        if: always()
        run: echo "Testy zakończone — sprawdź logi powyżej"
