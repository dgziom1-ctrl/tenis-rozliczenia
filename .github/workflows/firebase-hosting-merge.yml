name: Deploy to Firebase Hosting and Functions on merge

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Testy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Uruchom testy
        run: npm test

  build_and_deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            functions/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Install functions dependencies
        run: npm install
        working-directory: ./functions

      - name: Inject Firebase config into Service Worker
        run: |
          sed -i "s|PLACEHOLDER_API_KEY|${{ secrets.VITE_FIREBASE_API_KEY }}|g"                       frontend/public/firebase-messaging-sw.js
          sed -i "s|PLACEHOLDER_AUTH_DOMAIN|${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}|g"               frontend/public/firebase-messaging-sw.js
          sed -i "s|PLACEHOLDER_DATABASE_URL|${{ secrets.VITE_FIREBASE_DATABASE_URL }}|g"             frontend/public/firebase-messaging-sw.js
          sed -i "s|PLACEHOLDER_PROJECT_ID|${{ secrets.VITE_FIREBASE_PROJECT_ID }}|g"                 frontend/public/firebase-messaging-sw.js
          sed -i "s|PLACEHOLDER_STORAGE_BUCKET|${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}|g"         frontend/public/firebase-messaging-sw.js
          sed -i "s|PLACEHOLDER_MESSAGING_SENDER_ID|${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}|g" frontend/public/firebase-messaging-sw.js
          sed -i "s|PLACEHOLDER_APP_ID|${{ secrets.VITE_FIREBASE_APP_ID }}|g"                         frontend/public/firebase-messaging-sw.js

      - name: Build React app
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL:        ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_ADMIN_PASSWORD:               ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_BLIK_NUMBER:                  ${{ secrets.VITE_BLIK_NUMBER }}
          VITE_FIREBASE_VAPID_KEY:           ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      - name: Install Firebase CLI globally
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TENIS_ROZLICZENIA }}' > /tmp/sa_key.json
          firebase deploy --only hosting --project tenis-rozliczenia
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json

      - name: Deploy Firebase Functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TENIS_ROZLICZENIA }}' > /tmp/sa_key.json
          firebase deploy \
            --only functions:onSessionAdded,functions:onPlayerAdded \
            --project tenis-rozliczenia \
            --json
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json