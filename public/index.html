<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏓 Rozliczenia Tenis Stołowy</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --header-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --danger-gradient: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            --success-gradient: linear-gradient(135deg, #51cf66 0%, #37b24d 100%);
            --multi-gradient: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            --edit-gradient: linear-gradient(135deg, #f59f00 0%, #f76707 100%);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--primary-gradient); min-height: 100vh; padding: 10px; }
        
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
        
        header { background: var(--header-gradient); color: white; padding: 20px; text-align: center; }
        
        /* Styl dla BLIKa i kopiowania */
        .blik-info { 
            background: rgba(255,255,255,0.1); 
            display: inline-block; 
            padding: 8px 15px; 
            border-radius: 10px; 
            margin-top: 10px; 
            border: 1px dashed rgba(255,255,255,0.5); 
            cursor: pointer;
            transition: 0.2s;
        }
        .blik-info:hover { background: rgba(255,255,255,0.2); transform: scale(1.02); }
        .blik-info b { color: #ffeb3b; }

        .sync-status { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.85em; z-index: 1000; }
        .sync-status.connected { background: var(--success-gradient); }

        nav { display: flex; justify-content: center; background: #f8f9fa; padding: 10px; gap: 8px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; background: white; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #1e3c72; color: white; border-color: #1e3c72; }

        .content { padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .summary-card { background: var(--primary-gradient); color: white; padding: 18px; border-radius: 15px; text-align: center; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        
        .player-card { background: #f5f7fa; padding: 20px; border-radius: 15px; position: relative; transition: 0.3s; }
        .player-card.debt { background: var(--danger-gradient); color: white; }
        .player-card.paid { background: var(--success-gradient); color: white; }
        .player-card.organizer { background: #ffd700; color: #333; }

        /* Tooltip */
        .player-card .debt-details {
            visibility: hidden; width: 200px; background-color: #333; color: #fff; text-align: center;
            border-radius: 10px; padding: 10px; position: absolute; z-index: 10; bottom: 105%; left: 50%;
            transform: translateX(-50%); opacity: 0; transition: opacity 0.3s; font-size: 0.8em;
        }
        .player-card:hover .debt-details { visibility: visible; opacity: 1; }

        .rank-badge { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.3); padding: 4px 10px; border-radius: 15px; font-size: 0.8em; font-weight: bold; }
        .player-name { font-size: 1.4em; font-weight: bold; margin-bottom: 5px; }
        
        /* Klikalna kwota */
        .player-debt { 
            font-size: 1.8em; 
            font-weight: bold; 
            margin-bottom: 10px; 
            cursor: copy; 
            display: inline-block;
            transition: 0.2s;
        }
        .player-debt:hover { opacity: 0.8; transform: scale(1.05); }

        .pay-btn { width: 100%; padding: 12px; background: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Styl powiadomienia o kopiowaniu */
        #copyToast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 30px;
            font-size: 0.9em; z-index: 2000; display: none; animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; bottom: 10px; }
            20% { opacity: 1; bottom: 20px; }
            80% { opacity: 1; bottom: 20px; }
            100% { opacity: 0; bottom: 10px; }
        }

        .admin-section { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .submit-btn { width: 100%; padding: 15px; background: var(--primary-gradient); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="copyToast">Skopiowano! ✅</div>
    <div class="sync-status" id="syncStatus">⏳ Łączenie...</div>

    <div class="container">
        <header>
            <h1>🏓 Rozliczenia Tenis Stołowy</h1>
            <div class="blik-info" onclick="copyText('726620831')">
                📲 BLIK (kliknij by kopiować): <b>726 620 831</b>
            </div>
        </header>

        <nav>
            <button class="tab-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="showTab('admin')">⚙️ Panel Admina</button>
            <button class="tab-btn" onclick="showTab('history')">📅 Historia</button>
            <button class="tab-btn" onclick="showTab('players')">👥 Gracze</button>
        </nav>

        <main class="content">
            <section id="dashboard" class="tab-content active">
                <div class="summary-cards">
                    <div class="summary-card" style="background: var(--danger-gradient)">
                        <div>Do zebrania</div>
                        <div class="summary-value" id="totalDebt">0 zł</div>
                    </div>
                </div>
                <div id="playersGrid" class="dashboard-grid"></div>
            </section>

            <section id="admin" class="tab-content">
                <div class="admin-section">
                    <h3>➕ Dodaj nowy tydzień</h3>
                    <form id="weekForm">
                        <div class="form-group"><label>Data</label><input type="date" id="weekDate" required></div>
                        <div class="form-group"><label>Koszt całkowity</label><input type="number" id="weekCost" step="0.01" required></div>
                        <div class="form-group"><label>Obecni</label><div class="checkbox-group" id="presentPlayers"></div></div>
                        <div class="form-group"><label>Multisport</label><div class="checkbox-group" id="weekMultiPlayers"></div></div>
                        <button type="submit" class="submit-btn">💾 Zapisz tydzień</button>
                    </form>
                </div>
            </section>

            <section id="history" class="tab-content"><div id="weeksList"></div></section>
            <section id="players" class="tab-content">
                <div class="admin-section">
                    <form id="addPlayerForm">
                        <input type="text" id="newPlayerName" placeholder="Imię gracza" required style="padding:10px; border-radius:8px; border:1px solid #ddd;">
                        <button type="submit" class="submit-btn" style="margin-top:10px;">Dodaj gracza</button>
                    </form>
                </div>
                <div id="playersList"></div>
            </section>
        </main>
    </div>

    <script>
        // Funkcja kopiowania
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('copyToast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            });
        }

        const firebaseConfig = {
          apiKey: "AIzaSyA0aSm_EoDVibcu46IRL3xaFSskApWYrMo",
          authDomain: "tenis-rozliczenia.firebaseapp.com",
          databaseURL: "https://tenis-rozliczenia-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "tenis-rozliczenia",
          storageBucket: "tenis-rozliczenia.firebasestorage.app",
          messagingSenderId: "897063845076",
          appId: "1:897063845076:web:76aa13cf2ef1759a654f41"
        };

        firebase.initializeApp(firebaseConfig);
        const dataRef = firebase.database().ref('appData');

        let PLAYERS = ['Przemek', 'Krzysztof', 'Arek', 'Rafał', 'Mariusz', 'Kamil'];
        let appData = { players: [...PLAYERS], organizerName: 'Kamil', weeks: [], paidUntilWeek: {} };

        function loadData() {
            dataRef.on('value', (snapshot) => {
                if (snapshot.val()) {
                    appData = snapshot.val();
                    PLAYERS = appData.players || PLAYERS;
                    renderAll();
                }
            });
        }

        function saveData() { dataRef.set(appData); }

        function getDebtDetails(playerName) {
            if (playerName === appData.organizerName || !appData.weeks) return { total: 0, details: [] };
            let total = 0; let details = [];
            const paidIdx = appData.paidUntilWeek?.[playerName] ? appData.weeks.findIndex(w => w.id === appData.paidUntilWeek[playerName]) : -1;

            appData.weeks.forEach((week, idx) => {
                if (idx <= paidIdx || !week.present?.includes(playerName)) return;
                const multi = week.multiPlayers || [];
                if (multi.includes(playerName)) return;
                const payers = week.present.filter(p => !multi.includes(p)).length;
                if (payers > 0) {
                    const amount = week.cost / payers;
                    total += amount;
                    details.push(`${week.date}: ${amount.toFixed(2)} zł`);
                }
            });
            return { total, details };
        }

        function renderDashboard() {
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';
            let totalToCollect = 0;

            PLAYERS.forEach(player => {
                const debtInfo = getDebtDetails(player);
                const isOrg = player === appData.organizerName;
                if (!isOrg) totalToCollect += debtInfo.total;

                const tooltipHtml = debtInfo.details.length > 0 
                    ? `<div class="debt-details"><b>Kliknij kwotę, by skopiować</b><br><hr style="margin:5px 0;opacity:0.3;">${debtInfo.details.join('<br>')}</div>` 
                    : (isOrg ? '' : `<div class="debt-details">Wszystko opłacone! 😎</div>`);

                const debtFormatted = debtInfo.total.toFixed(2);

                grid.innerHTML += `
                    <div class="player-card ${isOrg ? 'organizer' : (debtInfo.total > 0 ? 'debt' : 'paid')}">
                        ${tooltipHtml}
                        <div class="rank-badge">${isOrg ? '👑' : '🎾'}</div>
                        <div class="player-name">${player}</div>
                        <div class="player-debt" onclick="copyText('${debtFormatted}')">
                            ${isOrg ? 'Kierownik' : debtFormatted + ' zł'}
                        </div>
                        ${!isOrg && debtInfo.total > 0 ? `<button class="pay-btn" onclick="markAsPaid('${player}')">Oznacz jako opłacone</button>` : ''}
                    </div>`;
            });
            document.getElementById('totalDebt').textContent = `${totalToCollect.toFixed(2)} zł`;
        }

        function markAsPaid(name) {
            if (!appData.weeks?.length) return;
            if (!appData.paidUntilWeek) appData.paidUntilWeek = {};
            appData.paidUntilWeek[name] = appData.weeks[appData.weeks.length - 1].id;
            saveData();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (event) event.currentTarget.classList.add('active');
        }

        function renderAdminCheckboxes() {
            const pCont = document.getElementById('presentPlayers');
            const mCont = document.getElementById('weekMultiPlayers');
            pCont.innerHTML = ''; mCont.innerHTML = '';
            PLAYERS.forEach(p => {
                pCont.innerHTML += `<div><input type="checkbox" class="present-check" value="${p}" checked> ${p}</div>`;
                mCont.innerHTML += `<div><input type="checkbox" class="multi-check" value="${p}"> ${p}</div>`;
            });
        }

        function renderAll() {
            renderDashboard();
            renderAdminCheckboxes();
        }

        document.getElementById('weekForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newWeek = {
                id: Math.random().toString(36).substr(2, 9),
                date: document.getElementById('weekDate').value,
                cost: parseFloat(document.getElementById('weekCost').value),
                present: Array.from(document.querySelectorAll('.present-check:checked')).map(cb => cb.value),
                multiPlayers: Array.from(document.querySelectorAll('.multi-check:checked')).map(cb => cb.value)
            };
            if(!appData.weeks) appData.weeks = [];
            appData.weeks.push(newWeek);
            saveData();
            e.target.reset();
            showTab('dashboard');
        });

        loadData();
    </script>
</body>
</html>
